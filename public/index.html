<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Momento">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>🌙 Momento - Comparte el ahora</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --bg-gradient: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 100%);
      --card: #12121a;
      --card-hover: #1a1a25;
      --border: #1e1e2e;
      --border-glow: rgba(124, 58, 237, 0.3);
      --text: #e0e0e0;
      --text-muted: #888899;
      --accent: #7c3aed;
      --accent-glow: rgba(124, 58, 237, 0.5);
      --accent-hover: #8b5cf6;
      --danger: #ef4444;
      --success: #22c55e;
      --permanent: #f59e0b;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 4px 20px rgba(124, 58, 237, 0.2);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px var(--accent-glow); }
      50% { box-shadow: 0 0 20px var(--accent-glow), 0 0 30px var(--accent-glow); }
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 0;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.5s ease;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.5px;
    }

    .logo span {
      background: linear-gradient(135deg, var(--accent), #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradient 3s ease infinite;
    }

    @keyframes gradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .logo-emoji {
      font-size: 2rem;
      filter: drop-shadow(0 0 10px var(--accent-glow));
    }

    .auth-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: white;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      background: rgba(124, 58, 237, 0.1);
    }

    .btn-danger {
      background: linear-gradient(135deg, var(--danger), #dc2626);
      color: white;
    }

    .btn-save {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 14px;
      font-size: 0.85rem;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .btn-save:hover {
      border-color: var(--permanent);
      color: var(--permanent);
      background: rgba(245, 158, 11, 0.1);
    }

    .btn-save.active {
      background: linear-gradient(135deg, var(--permanent), #d97706);
      border-color: var(--permanent);
      color: white;
      box-shadow: 0 2px 10px rgba(245, 158, 11, 0.3);
    }

    /* Auth Forms */
    .auth-form {
      background: var(--card);
      padding: 35px;
      border-radius: 16px;
      border: 1px solid var(--border);
      max-width: 420px;
      margin: 40px auto;
      animation: fadeIn 0.5s ease;
      box-shadow: var(--shadow);
    }

    .auth-form h2 {
      margin-bottom: 25px;
      text-align: center;
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .auth-switch a {
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    /* Post Creator */
    .post-creator {
      background: var(--card);
      padding: 25px;
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-bottom: 30px;
      animation: fadeIn 0.5s ease;
      box-shadow: var(--shadow);
    }

    .post-creator textarea {
      width: 100%;
      min-height: 120px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      resize: vertical;
      margin-bottom: 15px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .post-creator textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .post-creator textarea::placeholder {
      color: var(--text-muted);
    }

    .post-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .file-input {
      display: none;
    }

    .file-label {
      padding: 10px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .file-label:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(124, 58, 237, 0.1);
    }

    .post-timer {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      background: var(--bg);
    }

    .post-timer.can-post {
      color: var(--success);
      background: rgba(34, 197, 94, 0.1);
    }

    /* Posts Feed */
    .post {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeIn 0.5s ease;
      box-shadow: var(--shadow);
    }

    .post:hover {
      border-color: var(--border-glow);
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .post-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a855f7, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.3rem;
      color: white;
      box-shadow: 0 2px 10px var(--accent-glow);
    }

    .username {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
    }

    .post-time {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 2px;
    }

    .post-content {
      margin-bottom: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 1rem;
      color: var(--text);
    }

    .post-image {
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: var(--shadow);
    }

    .post-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .permanent-badge {
      background: linear-gradient(135deg, var(--permanent), #d97706);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
    }

    .expires-badge {
      background: var(--border);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .save-count {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    /* Messages */
    .message {
      padding: 15px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
      animation: fadeIn 0.3s ease;
      font-weight: 500;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .message.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .hidden {
      display: none !important;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      animation: fadeIn 0.5s ease;
    }

    .empty-state h3 {
      margin-bottom: 10px;
      color: var(--text);
      font-size: 1.5rem;
    }

    .empty-state p {
      font-size: 1rem;
    }

    /* Stats Bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 30px;
      animation: fadeIn 0.5s ease;
    }

    .stat-card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .loading::after {
      content: '...';
      animation: pulse 1.5s infinite;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 15px;
      }

      header {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }

      .logo {
        justify-content: center;
      }

      .stats-bar {
        grid-template-columns: 1fr;
      }

      .post-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .post-actions > div {
        display: flex;
        justify-content: center;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-emoji">🌙</span>
        <span>Momento</span>
      </div>
      <div class="auth-buttons" id="authButtons">
        <button class="btn btn-secondary" onclick="showLogin()">
          <span>🔑</span> Entrar
        </button>
        <button class="btn btn-primary" onclick="showRegister()">
          <span>✨</span> Registrarse
        </button>
      </div>
      <div class="auth-buttons hidden" id="userMenu">
        <span id="welcomeUser" style="margin-right: 15px; color: var(--text-muted); font-weight: 500;"></span>
        <button class="btn btn-secondary" onclick="logout()">
          <span>🚪</span> Salir
        </button>
      </div>
    </header>

    <div id="messageContainer"></div>

    <!-- Stats -->
    <div id="statsBar" class="stats-bar hidden">
      <div class="stat-card">
        <div class="stat-value" id="statPosts">0</div>
        <div class="stat-label">Posts totales</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statUsers">0</div>
        <div class="stat-label">Usuarios</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statPermanent">0</div>
        <div class="stat-label">Permanentes</div>
      </div>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="auth-form hidden">
      <h2>🌙 Bienvenido de nuevo</h2>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="loginUsername" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
          <span>🚀</span> Entrar
        </button>
      </form>
      <p class="auth-switch">
        ¿No tienes cuenta? <a onclick="showRegister()">Regístrate</a>
      </p>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="auth-form hidden">
      <h2>✨ Crea tu cuenta</h2>
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="regUsername" required minlength="3" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Email (opcional)</label>
          <input type="email" id="regEmail" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="regPassword" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
          <span>🎉</span> Crear cuenta
        </button>
      </form>
      <p class="auth-switch">
        ¿Ya tienes cuenta? <a onclick="showLogin()">Entra</a>
      </p>
    </div>

    <!-- Post Creator -->
    <div id="postCreator" class="post-creator hidden">
      <textarea id="postContent" placeholder="¿Qué momento quieres compartir?✨&#10;&#10;Recuerda: solo puedes publicar 1 vez cada hora..."></textarea>
      <div class="post-actions">
        <div>
          <input type="file" id="postImage" class="file-input" accept="image/*">
          <label for="postImage" class="file-label">
            <span>📷</span> Añadir imagen
          </label>
          <span id="fileName" style="margin-left: 10px; font-size: 0.85rem; color: var(--text-muted);"></span>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
          <span id="postTimer" class="post-timer">Cargando...</span>
          <button class="btn btn-primary" onclick="createPost()" id="postBtn">
            <span>🌙</span> Publicar
          </button>
        </div>
      </div>
    </div>

    <!-- Posts Feed -->
    <div id="postsFeed"></div>
  </div>

  <script>
    const API_URL = '';
    let token = localStorage.getItem('momento_token');
    let currentUser = null;

    // Registrar Service Worker para PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // Inicializar
    document.addEventListener('DOMContentLoaded', () => {
      if (token) {
        checkAuth();
      } else {
        showAuthButtons();
      }
      loadPosts();
      
      // File input listener
      document.getElementById('postImage').addEventListener('change', (e) => {
        const fileName = e.target.files[0]?.name;
        document.getElementById('fileName').textContent = fileName || '';
      });
    });

    // Auth functions
    function showAuthButtons() {
      document.getElementById('authButtons').classList.remove('hidden');
      document.getElementById('userMenu').classList.add('hidden');
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('postCreator').classList.add('hidden');
      document.getElementById('statsBar').classList.add('hidden');
    }

    function showLogin() {
      document.getElementById('authButtons').classList.add('hidden');
      document.getElementById('userMenu').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
    }

    function showRegister() {
      document.getElementById('authButtons').classList.add('hidden');
      document.getElementById('userMenu').classList.add('hidden');
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.remove('hidden');
    }

    function showLoggedIn() {
      document.getElementById('authButtons').classList.add('hidden');
      document.getElementById('userMenu').classList.remove('hidden');
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('postCreator').classList.remove('hidden');
      document.getElementById('statsBar').classList.remove('hidden');
    }

    async function checkAuth() {
      try {
        const res = await fetch(`${API_URL}/api/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (res.ok) {
          const data = await res.json();
          currentUser = data.user;
          document.getElementById('welcomeUser').textContent = `@${currentUser.username}`;
          showLoggedIn();
          updatePostTimer(data.nextPostTime, data.canPostNow);
        } else {
          logout();
        }
      } catch (error) {
        console.error('Error checking auth:', error);
        logout();
      }
    }

    function logout() {
      token = null;
      currentUser = null;
      localStorage.removeItem('momento_token');
      showAuthButtons();
      loadPosts();
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const res = await fetch(`${API_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        
        if (res.ok) {
          token = data.token;
          currentUser = data.user;
          localStorage.setItem('momento_token', token);
          document.getElementById('welcomeUser').textContent = `@${currentUser.username}`;
          showLoggedIn();
          updatePostTimer(null, true);
          loadPosts();
          showMessage('¡Bienvenido de nuevo! 🎉', 'success');
        } else {
          showMessage(data.error, 'error');
        }
      } catch (error) {
        showMessage('Error de conexión', 'error');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regUsername').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;

      try {
        const res = await fetch(`${API_URL}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();
        
        if (res.ok) {
          token = data.token;
          currentUser = data.user;
          localStorage.setItem('momento_token', token);
          document.getElementById('welcomeUser').textContent = `@${currentUser.username}`;
          showLoggedIn();
          updatePostTimer(null, true);
          loadPosts();
          showMessage('¡Cuenta creada! Ya puedes publicar 🚀', 'success');
        } else {
          showMessage(data.error, 'error');
        }
      } catch (error) {
        showMessage('Error de conexión', 'error');
      }
    }

    // Post functions
    function updatePostTimer(nextPostTime, canPostNow) {
      const timerEl = document.getElementById('postTimer');
      const postBtn = document.getElementById('postBtn');
      
      if (canPostNow || !nextPostTime) {
        timerEl.textContent = '✅ Puedes publicar ahora';
        timerEl.className = 'post-timer can-post';
        postBtn.disabled = false;
      } else {
        const nextTime = new Date(nextPostTime);
        const now = new Date();
        const diff = nextTime - now;
        const minutes = Math.ceil(diff / 60000);
        
        timerEl.textContent = `⏱️ Próximo post en ${minutes} min`;
        timerEl.className = 'post-timer';
        postBtn.disabled = true;
      }
    }

    async function createPost() {
      const content = document.getElementById('postContent').value.trim();
      const imageFile = document.getElementById('postImage').files[0];
      
      if (!content) {
        showMessage('Escribe algo para publicar', 'error');
        return;
      }

      const formData = new FormData();
      formData.append('content', content);
      if (imageFile) {
        formData.append('image', imageFile);
      }

      try {
        const res = await fetch(`${API_URL}/api/posts`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });

        const data = await res.json();
        
        if (res.ok) {
          document.getElementById('postContent').value = '';
          document.getElementById('postImage').value = '';
          document.getElementById('fileName').textContent = '';
          showMessage('¡Momento publicado! 🌙', 'success');
          checkAuth();
          loadPosts();
        } else {
          if (data.nextPostIn) {
            showMessage(`⏱️ ${data.error}. ${data.nextPostIn}`, 'error');
          } else {
            showMessage(data.error, 'error');
          }
        }
      } catch (error) {
        showMessage('Error de conexión', 'error');
      }
    }

    async function loadPosts() {
      document.getElementById('postsFeed').innerHTML = '<div class="loading">Cargando momentos</div>';
      
      try {
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const res = await fetch(`${API_URL}/api/posts`, { headers });
        
        if (res.ok) {
          const posts = await res.json();
          renderPosts(posts);
        } else {
          renderPosts([]);
        }
        
        // Cargar estadísticas reales de la DB
        loadStats();
      } catch (error) {
        console.error('Error loading posts:', error);
        renderPosts([]);
      }
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API_URL}/api/stats`);
        if (res.ok) {
          const stats = await res.json();
          document.getElementById('statPosts').textContent = stats.totalPosts;
          document.getElementById('statUsers').textContent = stats.totalUsers;
          document.getElementById('statPermanent').textContent = stats.permanentPosts;
        }
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    function renderPosts(posts) {
      const feed = document.getElementById('postsFeed');
      
      if (posts.length === 0) {
        feed.innerHTML = `
          <div class="empty-state">
            <h3>🌑 Sin momentos aún</h3>
            <p>Sé el primero en compartir algo ✨</p>
          </div>
        `;
        return;
      }

      feed.innerHTML = posts.map(post => {
        const timeAgo = getTimeAgo(new Date(post.created_at + 'Z'));
        const expiresAt = new Date(post.expires_at + 'Z');
        const hoursLeft = Math.max(0, Math.ceil((expiresAt - new Date()) / 3600000));
        
        return `
          <div class="post">
            <div class="post-header">
              <div class="post-author">
                <div class="avatar">${escapeHtml(post.username[0].toUpperCase())}</div>
                <div>
                  <div class="username">@${escapeHtml(post.username)}</div>
                  <div class="post-time">${timeAgo}</div>
                </div>
              </div>
            </div>
            
            ${post.content ? `<div class="post-content">${escapeHtml(post.content)}</div>` : ''}
            ${post.image ? `<img src="${post.image}" class="post-image" alt="Post image">` : ''}
            
            <div class="post-footer">
              <div class="post-meta">
                ${post.is_permanent 
                  ? '<span class="permanent-badge">💾 Permanente</span>' 
                  : `<span class="expires-badge">⏳ ${hoursLeft}h restantes</span>`
                }
                <button class="btn btn-save ${post.saved_by_current ? 'active' : ''}" 
                        onclick="toggleSave('${post.id}')"
                        ${!token ? 'disabled' : ''}>
                  💾 ${post.save_count}
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function toggleSave(postId) {
      if (!token) {
        showMessage('Inicia sesión para salvar momentos', 'error');
        return;
      }

      try {
        const res = await fetch(`${API_URL}/api/posts/${postId}/save`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) {
          loadPosts();
        } else {
          const data = await res.json();
          if (data.error !== 'Ya salvaste este post') {
            showMessage(data.error, 'error');
          }
        }
      } catch (error) {
        showMessage('Error de conexión', 'error');
      }
    }

    // Utilities
    function showMessage(text, type) {
      const container = document.getElementById('messageContainer');
      container.innerHTML = `<div class="message ${type}">${text}</div>`;
      setTimeout(() => container.innerHTML = '', 5000);
    }

    function getTimeAgo(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      
      if (seconds < 60) return 'Ahora';
      if (seconds < 3600) return `Hace ${Math.floor(seconds / 60)} min`;
      if (seconds < 86400) return `Hace ${Math.floor(seconds / 3600)} h`;
      return `Hace ${Math.floor(seconds / 86400)} d`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
